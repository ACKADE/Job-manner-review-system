Name: career-api
Host: 0.0.0.0
Port: 8888
Mode: dev

Log:
  ServiceName: career-api
  Mode: console
  Level: info
  KeepDays: 7

Mysql:
  DataSource: root:123456zj@tcp(localhost:3306)/career_db?charset=utf8mb4&parseTime=true&loc=Local
  MaxOpenConns: 100
  MaxIdleConns: 10
  ConnMaxLifetime: 3600

Redis:
  Host: localhost:6379
  Type: node
  Pass: ""
  DB: 0
  PoolSize: 100

CacheRedis:
  Host: localhost:6379
  Pass: ""
  DB: 1
  PoolSize: 50

Auth:
  AccessSecret: your-secret-key-change-in-production
  AccessExpire: 86400

AI:
  Provider: openai
  ApiKey: ${AI_API_KEY}
  Model: gpt-4
  BaseURL: https://api.openai.com/v1
  Timeout: 30

Prometheus:
  Host: 0.0.0.0
  Port: 9091

CORS:
  Origins:
    - http://localhost:3000
    - http://localhost:8080
  Methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  Headers:
    - Content-Type
    - Authorization
    - X-Requested-With

RateLimit:
  TokensPerSecond: 100
  Burst: 200

CircuitBreaker:
  ForceOpen: false
  SleepWindow: 5000
  ErrorPercentThreshold: 50
